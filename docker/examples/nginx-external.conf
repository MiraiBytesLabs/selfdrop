# ── SelfDrop — External Nginx reverse proxy example ───────
#
# Use this when PROXY_MODE=external in your docker-compose.yml.
# Place this in your Nginx sites-available and adjust as needed.
#
# This assumes:
#   - SelfDrop Node backend is reachable at localhost:3000
#     (or wherever you mapped the container port)
#   - Your files are mounted at /path/to/your/files on the host
#   - You are handling SSL termination (recommended — see below)

server {
  listen 80;
  server_name selfdrop.yourdomain.com;

  # Recommended: redirect HTTP to HTTPS
  # return 301 https://$host$request_uri;

  # ── Internal file serving (X-Accel-Redirect) ─────────
  # IMPORTANT: The alias path must match your host files directory.
  # This must match the volume mount you set in docker-compose.yml:
  #   volumes:
  #     - /path/to/your/files:/data/files
  # Set the alias to the HOST path, not the container path.
  location /internal-files/ {
    internal;
    alias /path/to/your/files/;
    add_header Accept-Ranges bytes;
  }

  # ── API proxy ─────────────────────────────────────────
  location /api/ {
    proxy_pass         http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # ── Download handler ──────────────────────────────────
  location /s/ {
    proxy_pass         http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_buffering    on;
  }

  # ── Health check ──────────────────────────────────────
  location /health {
    proxy_pass http://localhost:3000;
  }

  # ── Frontend ──────────────────────────────────────────
  location / {
    proxy_pass         http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }
}

