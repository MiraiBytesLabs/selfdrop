# ── Core ──────────────────────────────────────────────────
server.port          = 80
server.bind          = "0.0.0.0"
server.document-root = "/app/frontend"
server.upload-dirs   = ( "/tmp" )
server.errorlog      = "/dev/stderr"
server.pid-file      = "/run/lighttpd.pid"

# ── Modules ───────────────────────────────────────────────
server.modules = (
  "mod_access",
  "mod_alias",
  "mod_proxy",
  "mod_rewrite",
  "mod_setenv",
  "mod_expire"
)

# ── MIME types ────────────────────────────────────────────
mimetype.assign = (
  ".html"  => "text/html; charset=utf-8",
  ".css"   => "text/css",
  ".js"    => "application/javascript",
  ".json"  => "application/json",
  ".svg"   => "image/svg+xml",
  ".ico"   => "image/x-icon",
  ".png"   => "image/png",
  ".jpg"   => "image/jpeg",
  ".jpeg"  => "image/jpeg",
  ".gif"   => "image/gif",
  ".webp"  => "image/webp",
  ".woff"  => "font/woff",
  ".woff2" => "font/woff2",
  ".ttf"   => "font/ttf"
)

# ── X-Sendfile ────────────────────────────────────────────
# mod_xsendfile is compiled into the Lighttpd binary in Alpine.
# No server.modules entry needed — directives work directly.
# SECURITY: Only files within /data/files can be served this way.
xsendfile.activate      = "enable"
xsendfile.allowed-paths = ( "/data/files" )

# ── Proxy: API and download routes → Node backend ─────────
# allow-x-sendfile is required for X-Sendfile to work through the proxy.
# Without it, Lighttpd ignores the X-Sendfile header from the backend.
proxy.server = (
  "/api" => ((
    "host" => "127.0.0.1",
    "port" => 3000
  )),
  "/s" => ((
    "host" => "127.0.0.1",
    "port" => 3000,
    "allow-x-sendfile" => "enable"
  )),
  "/health" => ((
    "host" => "127.0.0.1",
    "port" => 3000
  ))
)

# ── SPA routing ───────────────────────────────────────────
url.rewrite-if-not-file = (
  "^/api"    => "$0",
  "^/s"      => "$0",
  "^/health" => "$0",
  "^/(.*)"   => "/index.html"
)

# ── Security headers ──────────────────────────────────────
setenv.add-response-header = (
  "X-Content-Type-Options"  => "nosniff",
  "X-Frame-Options"         => "DENY",
  "X-XSS-Protection"        => "1; mode=block",
  "Referrer-Policy"         => "strict-origin-when-cross-origin"
)

# ── Static asset caching ──────────────────────────────────
$HTTP["url"] =~ "\.(css|js|woff2?|ttf|ico|png|jpg|jpeg|gif|webp|svg)$" {
  expire.url = ( "" => "access plus 1 years" )
}

# ── Index file ────────────────────────────────────────────
index-file.names = ( "index.html" )

# ── Directory listing — disabled ──────────────────────────
dir-listing.activate = "disable"