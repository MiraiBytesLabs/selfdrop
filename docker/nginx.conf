# ── SelfDrop embedded Nginx configuration ─────────────────
#
# This config is used when PROXY_MODE=internal (default).
# Nginx sits in front of Node, serves static frontend files,
# proxies API requests, and handles file downloads via
# X-Accel-Redirect — files are served directly from disk
# without passing through the Node process.

worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Efficient file transfers — uses sendfile() syscall
  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;

  # Logging to stdout/stderr for Docker
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  # Hide Nginx version from headers
  server_tokens off;

  # ── Internal file serving location ──────────────────────
  # This location is NOT accessible from the outside.
  # It is only reachable via X-Accel-Redirect from Node.
  # Node sets: X-Accel-Redirect: /internal-files/path/to/file
  # Nginx maps that to: /data/files/path/to/file
  #
  # SECURITY: `internal` directive ensures direct requests
  # to /internal-files/ return 404.
  server {
    listen 80;
    server_name _;

    # ── Static frontend ───────────────────────────────────
    root /app/frontend;
    index index.html;

    # ── Internal file serving (X-Accel-Redirect) ─────────
    location /internal-files/ {
      internal;
      alias /data/files/;

      # Support range requests for pause/resume and video seeking
      add_header Accept-Ranges bytes;
    }

    # ── Internal ZIP serving (X-Accel-Redirect for ZIPs) ────
    # Temp ZIPs built by Node are served directly from disk by Nginx.
    # The `internal` directive prevents direct browser access.
    location /internal-zips/ {
      internal;
      alias /tmp/selfdrop-zips/;
      add_header Accept-Ranges bytes;
    }

    # ── API proxy → Node backend ──────────────────────────
    location /api/ {
      proxy_pass         http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Increase timeout for large requests
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # ── Download proxy → Node backend ────────────────────
    # Regex location to explicitly capture all /s/* paths.
    # This takes priority over the prefix location / and ensures
    # all share routes (/s/:uuid, /s/:uuid/file/*, /s/:uuid/preview/*, etc.)
    # are proxied to Node rather than served as static files.
    location ~ ^/s/ {
      proxy_pass         http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_buffering    off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── Health check ──────────────────────────────────────
    location /health {
      proxy_pass http://127.0.0.1:3000;
    }

    # ── Share page (/share/<uuid>) ────────────────────────
    # Public download page — served by React, no auth needed.
    # /share/<uuid> is the UI route; /s/<uuid> is the actual download.
    location ~ ^/share/[0-9a-f-]+$ {
      try_files $uri /index.html;
    }

    # ── SPA fallback ──────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                    always;
    add_header X-Frame-Options         "DENY"                       always;
    add_header X-XSS-Protection        "1; mode=block"              always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Static asset caching ──────────────────────────────
    location ~* \.(css|js|woff2?|ttf|ico|png|jpg|jpeg|gif|webp|svg)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}