  <rect x="0" y="0" width="5" height="400" fill="#2d6a4f"/>

  <!-- Logo mark scaled up ~3.5x, centered vertically -->
  <g transform="translate(72, 148) scale(3.5)">
    <circle cx="16" cy="24" r="3" fill="#2d6a4f"/>
    <line x1="16" y1="21" x2="16" y2="10" stroke="#2d6a4f" stroke-width="1.5"/>
    <line x1="16" y1="14" x2="10" y2="8" stroke="#2d6a4f" stroke-width="1" stroke-linecap="round"/>
    <line x1="16" y1="12" x2="22" y2="6" stroke="#2d6a4f" stroke-width="1" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="9" y2="12" stroke="#2d6a4f" stroke-width="1" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="23" y2="13" stroke="#2d6a4f" stroke-width="1" stroke-linecap="round"/>
    <circle cx="10" cy="8" r="2" fill="#2d6a4f" opacity="0.5"/>
    <circle cx="22" cy="6" r="2" fill="#2d6a4f" opacity="0.5"/>
    <circle cx="9" cy="12" r="2" fill="#2d6a4f" opacity="0.5"/>
    <circle cx="23" cy="13" r="2" fill="#2d6a4f" opacity="0.5"/>
