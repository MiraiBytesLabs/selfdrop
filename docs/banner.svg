  <!-- selfdrop wordmark -->
  <text x="200" y="234" font-family="'IBM Plex Mono', 'Courier New', monospace" font-weight="500" font-size="96" fill="#e8e6e0" letter-spacing="-3">selfdrop</text>

  <!-- Divider -->
  <line x1="72" y1="272" x2="1128" y2="272" stroke="#2e2e2b" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="72" y="316" font-family="'IBM Plex Mono', 'Courier New', monospace" font-weight="400" font-size="18" fill="#5a5a56" letter-spacing="3">SELF-HOSTED FILE SHARING</text>

  <!-- v0.1.0 badge -->
  <rect x="620" y="294" width="140" height="34" fill="#1a2e22" rx="6"/>
  <text x="690" y="317" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="17" fill="#4a9e74" text-anchor="middle" letter-spacing="1">v0.1.1</text>

